services:
  bot:
    build: .
    container_name: codenames_bot
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/codenames.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: codenames_redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
